# ============================================================
#  Configurações da aplicação — Clientes API
# ============================================================

# Porta onde o servidor vai rodar (padrão do Spring já é 8080,
# mas deixar explícito deixa mais claro para quem lê o projeto)
server.port=8080

# Nome da aplicação (aparece nos logs)
spring.application.name=clientes-api

# Nível de log: INFO mostra as mensagens principais sem poluir o console
logging.level.root=INFO
logging.level.com.loja.clientes=DEBUG
